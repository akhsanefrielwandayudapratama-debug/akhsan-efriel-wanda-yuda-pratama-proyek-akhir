{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-warning text-dark">

                <h3 class="mb-0">
                    <i class="bi bi-pencil-square"></i>
                    Edit Data Pasien
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Nama Pasien
                        </label>

                        <input
                            type="text"
                            name="nama"
                            class="form-control"
                            value="{{ pasien.nama }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Umur
                        </label>

                        <input
                            type="number"
                            name="umur"
                            class="form-control"
                            value="{{ pasien.umur }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Alamat
                        </label>

                        <textarea
                            name="alamat"
                            class="form-control"
                            rows="3"
                            required>{{ pasien.alamat }}</textarea>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Nomor HP
                        </label>

                        <input
                            type="text"
                            name="no_hp"
                            class="form-control"
                            value="{{ pasien.no_hp }}"
                            required>

                    </div>

                    <div class="d-flex justify-content-between">

                        <a href="/" class="btn btn-secondary">

                            <i class="bi bi-arrow-left-circle"></i>
                            Kembali

                        </a>

                        <button type="submit" class="btn btn-warning">

                            <i class="bi bi-check-circle-fill"></i>
                            Update Data

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
