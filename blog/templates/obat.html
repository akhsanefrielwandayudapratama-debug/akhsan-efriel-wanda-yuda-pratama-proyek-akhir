{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="fw-bold">
        <i class="bi bi-capsule-pill text-warning"></i>
        Data Obat
    </h2>

    <a href="/tambah-obat/" class="btn btn-warning text-white shadow">
        <i class="bi bi-plus-circle-fill"></i>
        Tambah Obat
    </a>

</div>

<div class="card shadow-lg border-0">

    <div class="card-body p-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">

                    <tr>

                        <th>No</th>
                        <th>Nama Obat</th>
                        <th>Stok</th>
                        <th>Harga</th>
                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody>

                    {% for obat in data_obat %}

                    <tr>

                        <td>{{ forloop.counter }}</td>

                        <td>{{ obat.nama_obat }}</td>

                        <td>{{ obat.stok }}</td>

                        <td>Rp {{ obat.harga }}</td>

                        <td>

                            <a href="/edit-obat/{{ obat.id }}/"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil-square"></i>

                                Edit

                            </a>

                            <a href="/hapus-obat/{{ obat.id }}/"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Yakin ingin menghapus data obat ini?')">

                                <i class="bi bi-trash"></i>

                                Hapus

                            </a>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="5" class="text-center py-4">

                            Belum ada data obat.

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
