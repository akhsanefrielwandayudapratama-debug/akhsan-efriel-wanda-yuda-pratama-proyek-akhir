{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-warning text-white">

            <h3 class="mb-0">
                <i class="bi bi-capsule-pill"></i>
                Tambah Data Obat
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nama Obat</label>
                    <input type="text"
                           name="nama_obat"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number"
                           name="stok"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Harga</label>
                    <input type="number"
                           name="harga"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-warning text-white">
                    <i class="bi bi-save"></i>
                    Simpan
                </button>

                <a href="/obat/" class="btn btn-secondary">
                    Kembali
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
