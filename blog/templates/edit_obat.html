{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-warning text-white">

            <h3 class="mb-0">
                <i class="bi bi-pencil-square"></i>
                Edit Data Obat
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">Nama Obat</label>

                    <input
                        type="text"
                        name="nama_obat"
                        class="form-control"
                        value="{{ obat.nama_obat }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Stok</label>

                    <input
                        type="number"
                        name="stok"
                        class="form-control"
                        value="{{ obat.stok }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Harga</label>

                    <input
                        type="number"
                        name="harga"
                        class="form-control"
                        value="{{ obat.harga }}"
                        required>

                </div>

                <button class="btn btn-success">
                    <i class="bi bi-save-fill"></i>
                    Simpan Perubahan
                </button>

                <a href="/obat/" class="btn btn-secondary">
                    Kembali
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
