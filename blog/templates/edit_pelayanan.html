{% extends 'base.html' %}

{% block content %}

<div class="card shadow-lg">

    <div class="card-header bg-warning text-white">

        <h3>
            <i class="bi bi-pencil-square"></i>
            Edit Data Pelayanan
        </h3>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Pasien</label>

                <select name="pasien" class="form-control">

                    {% for p in pasien %}

                    <option value="{{ p.id }}"
                        {% if p.id == pelayanan.pasien.id %}selected{% endif %}>

                        {{ p.nama }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label>Dokter</label>

                <select name="dokter" class="form-control">

                    {% for d in dokter %}

                    <option value="{{ d.id }}"
                        {% if d.id == pelayanan.dokter.id %}selected{% endif %}>

                        {{ d.nama }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label>Keluhan</label>

                <textarea
                    name="keluhan"
                    class="form-control"
                    rows="3">{{ pelayanan.keluhan }}</textarea>

            </div>

            <div class="mb-3">

                <label>Diagnosa</label>

                <textarea
                    name="diagnosa"
                    class="form-control"
                    rows="3">{{ pelayanan.diagnosa }}</textarea>

            </div>

            <div class="mb-3">

                <label>Tanggal</label>

                <input
                    type="date"
                    name="tanggal"
                    class="form-control"
                    value="{{ pelayanan.tanggal|date:'Y-m-d' }}">

            </div>

            <button class="btn btn-warning text-white">

                <i class="bi bi-save"></i>

                Update

            </button>

            <a href="/pelayanan/" class="btn btn-secondary">

                Kembali

            </a>

        </form>

    </div>

</div>

{% endblock %}
